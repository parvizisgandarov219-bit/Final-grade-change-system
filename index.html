<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#e8f0f7,#f0ece8);background-attachment:fixed;color:#1a1a18;font-size:14px}
.topbar{background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.08);padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;flex-shrink:0}
.navs{display:flex;gap:2px;background:rgba(0,0,0,.06);padding:3px;border-radius:9px;margin-left:auto;overflow-x:auto}
.nb{padding:6px 10px;font-size:11px;border-radius:7px;border:none;background:transparent;font-weight:500;color:#6b6b67;cursor:pointer;white-space:nowrap;font-family:inherit}
.nb.on{background:#fff;font-weight:800;color:#185FA5;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.page{display:none;padding:14px;width:100%}
.page.on{display:block}
.card{background:rgba(255,255,255,.88);border-radius:13px;border:1px solid rgba(255,255,255,.7);padding:14px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ct{font-weight:800;font-size:12px;color:#777;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.pbar{height:8px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden;margin-bottom:4px}
/* LOGIN */
#login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#e8f0f7,#f0ece8);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:36px 28px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center}
.login-role-btn{padding:18px 10px;border-radius:12px;cursor:pointer;font-family:inherit;border:2px solid transparent;width:100%;background:transparent;transition:background .2s}
/* START */
.start-box{background:rgba(24,95,165,.04);border:1.5px dashed rgba(24,95,165,.3);border-radius:14px;padding:40px 20px;text-align:center;margin-bottom:12px}
.start-icon{width:76px;height:76px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;color:#fff}
.btn-start{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:12px;padding:15px 40px;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(24,95,165,.38)}
.done-banner{background:rgba(59,109,17,.06);border:1.5px solid rgba(59,109,17,.28);border-radius:14px;padding:30px 20px;text-align:center;margin-bottom:12px}
.done-icon{width:68px;height:68px;background:linear-gradient(135deg,#3B6D11,#5a9a1a);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#fff}
.el-bar{background:rgba(24,95,165,.07);border:1px solid rgba(24,95,165,.18);border-radius:11px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.el-val{font-family:monospace;font-weight:900;font-size:20px;color:#185FA5}
/* STEPS */
.stbl{width:100%;border-collapse:collapse}
.stbl tr{border-bottom:1px solid rgba(0,0,0,.06)}
.stbl tr.sd{background:rgba(192,221,151,.1)}
.stbl tr.sa{background:rgba(250,199,117,.09)}
.sn{width:36px;text-align:center;vertical-align:top;padding:11px 4px;font-family:monospace;font-weight:900;font-size:13px;color:#bbb;border-left:4px solid rgba(0,0,0,.08)}
.sc{padding:11px 13px;vertical-align:top}
.stamp{font-size:11px;color:#3B6D11;background:rgba(192,221,151,.35);padding:3px 8px;border-radius:5px;display:inline-block;margin-top:4px}
/* BUTTONS */
.bb{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.bg{background:linear-gradient(135deg,#3B6D11,#5a9a1a);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.bx{background:rgba(0,0,0,.05);color:#6b6b67;border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.bc{background:rgba(234,243,222,.9);color:#3B6D11;border:1px solid rgba(59,109,17,.28);border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;text-align:center;line-height:1.4}
.bc small{display:block;font-size:10px;color:#4a8a22;font-weight:500}
.bdel{background:rgba(252,235,235,.9);color:#A32D2D;border:1px solid rgba(247,193,193,.7);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.bedit{background:rgba(230,241,251,.9);color:#185FA5;border:1px solid rgba(24,95,165,.25);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
/* QUALITY BARS */
.qw{margin-bottom:13px}
.qbar{position:relative;height:10px;background:rgba(0,0,0,.07);border-radius:5px;overflow:hidden;margin-bottom:3px}
.qband{position:absolute;height:100%;background:#C0DD97;opacity:.55}
.qtgt{position:absolute;width:2px;height:100%;background:#3B6D11;opacity:.7}
.qdot{position:absolute;top:-1px;width:12px;height:12px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.spec-box{background:rgba(255,255,255,.7);border-radius:9px;padding:10px 13px;border-left:4px solid #ddd}
/* SAMPLES */
.sm-tbl{width:100%;font-size:12px;border-collapse:collapse}
.sm-tbl th{padding:4px 6px;color:#777;font-weight:600;border-bottom:1px solid rgba(0,0,0,.08);text-align:right;font-size:11px}
.sm-tbl th:first-child{text-align:left}
.sm-tbl td{padding:5px 6px;border-bottom:1px solid rgba(0,0,0,.05);font-family:monospace}
.sm-tbl td:not(:first-child){text-align:right}
.ok{color:#3B6D11;font-weight:700}.bad{color:#E24B4A;font-weight:700}
.pill{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700}
.pill.done{background:rgba(192,221,151,.4);color:#3B6D11}
.pill.act{background:rgba(250,199,117,.35);color:#854F0B}
.pill.pend{background:rgba(0,0,0,.05);color:#777}
/* ENGINEER */
.ti{background:rgba(255,255,255,.88);border-radius:11px;border:1px solid rgba(0,0,0,.08);padding:13px 15px;margin-bottom:9px}
.ti.open{border-color:rgba(24,95,165,.3);border-width:1.5px}
.ti-arrow{width:30px;height:30px;border-radius:7px;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.ti.open .ti-arrow{background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff}
.eng-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.ep{background:rgba(192,221,151,.12);border:1.5px solid rgba(192,221,151,.5);border-radius:9px;padding:13px;margin:4px 0 8px}
.pb-box{background:rgba(192,221,151,.15);border:1px solid rgba(192,221,151,.4);border-radius:9px;padding:12px;margin-bottom:12px}
/* FORMS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.fld label{display:block;font-size:11px;color:#777;margin-bottom:3px;font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid rgba(0,0,0,.13);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.85)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.fld textarea{resize:vertical}
.fx{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sel{border:1px solid rgba(0,0,0,.13);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.85)}
.mon{font-family:monospace}
.hidden{display:none}
.nt-form{background:rgba(245,243,239,.85);border-radius:11px;padding:16px;margin-bottom:13px;border:1px solid rgba(0,0,0,.08)}
/* WORKBOOKS */
.wb-sec{border:1px solid rgba(0,0,0,.08);border-radius:9px;margin-bottom:7px;overflow:hidden}
.wb-sec-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;background:rgba(0,0,0,.02);user-select:none}
.wb-tbl{width:100%;font-size:12px;border-collapse:collapse;min-width:480px}
.wb-tbl th{text-align:left;padding:5px 7px;color:#777;font-weight:600;font-size:11px;border-bottom:1px solid rgba(0,0,0,.08);background:rgba(0,0,0,.03)}
.wb-tbl td{padding:6px 7px;border-bottom:1px solid rgba(0,0,0,.05)}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;font-size:12px}
  .topbar,#login-screen,.bb,.bg,.bx,.bdel,.bedit,.btn-start,#sf,
  #dash,#eng,#wb,
  .print-hide,
  .el-bar,
  .start-box,
  .done-banner,
  [onclick^="togSF"],[onclick^="resetTrans"],[onclick^="doPDF"],[onclick^="doShare"],[onclick^="completeTrans"]{display:none!important}
  .page{display:none!important;padding:0}
  #op{display:block!important;padding:8px}
  .card{box-shadow:none!important;border:1px solid #ddd!important;background:#fff!important;margin-bottom:8px!important;break-inside:avoid}
  /* hide spec gauge section (qbar rows) and trend chart - keep only steps, lab table, chat, log */
  .print-hide-spec,.qw,#sf{display:none!important}
  /* hide add result button row */
  .card .fx>[onclick="togSF()"]{display:none!important}
  table{break-inside:avoid}
  .stbl tr{break-inside:avoid}
}
</style>
</head>
<body>
<div id="login-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#e8f0f7,#f0ece8);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px">
  <div style="background:#fff;border-radius:18px;padding:36px 32px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center">
    <div style="width:64px;height:64px;background:linear-gradient(135deg,#185FA5,#2b7fc4);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px;color:#fff;font-weight:900;letter-spacing:1px">GC</div>
    <div style="font-size:22px;font-weight:900;margin-bottom:4px">Grade Change System</div>
    <div style="font-size:13px;color:#777;margin-bottom:28px">PP Plant &#8212; Transition Management</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">
      <button onclick="showOpLogin()" style="padding:18px 10px;background:rgba(24,95,165,.08);border:2px solid rgba(24,95,165,.2);border-radius:12px;cursor:pointer;font-family:inherit">
        <div style="font-size:24px;margin-bottom:6px">&#128084;</div>
        <div style="font-weight:800;font-size:13px;color:#185FA5">Operator</div>
        <div style="font-size:11px;color:#777;margin-top:2px">Badge number login</div>
      </button>
      <button onclick="showPELogin()" style="padding:18px 10px;background:rgba(59,109,17,.08);border:2px solid rgba(59,109,17,.2);border-radius:12px;cursor:pointer;font-family:inherit">
        <div style="font-size:24px;margin-bottom:6px">&#128736;</div>
        <div style="font-weight:800;font-size:13px;color:#3B6D11">Process Engineer</div>
        <div style="font-size:11px;color:#777;margin-top:2px">Password login</div>
      </button>
    </div>
    <div id="op-login-form" style="display:none;border-top:1px solid rgba(0,0,0,.08);margin-top:16px;padding-top:16px">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">&#127818; Badge Number</div>
      <input id="op-badge" type="number" placeholder="10161" oninput="lookupBadge()" onkeydown="if(event.key==='Enter')loginOp()" style="width:100%;border:1.5px solid rgba(24,95,165,.2);border-radius:9px;padding:13px 14px;font-size:22px;font-family:monospace;letter-spacing:3px;margin-bottom:8px;background:#f8f9fc;text-align:center">

        <div style="font-size:11px;color:#3B6D11;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em">&#10003; Employee found</div>
        <div id="op-name-text" style="font-size:16px;font-weight:900;color:#185FA5"></div>
        <div id="op-pos-text" style="font-size:12px;color:#777;margin-top:2px"></div>
      </div>
      <div id="op-err" style="display:none;background:rgba(252,235,235,.9);border:1px solid rgba(231,50,50,.2);border-radius:8px;padding:9px 12px;margin-bottom:10px;text-align:center;font-size:12px;color:#A32D2D;font-weight:600">&#9888; Badge number not found. Contact your PE to be added to the system.</div>
      <div style="display:flex;gap:8px">
        <button onclick="loginOp()" style="flex:1;padding:11px;background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">Login</button>
        <button onclick="hideOpLogin()" style="padding:11px 16px;background:rgba(0,0,0,.05);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>
      </div>
    </div>
    <div id="pe-login-form" style="display:none;border-top:1px solid rgba(0,0,0,.08);margin-top:16px;padding-top:16px">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Process Engineer Password</div>
      <input id="pe-pwd" type="password" placeholder="Enter password..." onkeydown="if(event.key==='Enter')loginPE()" style="width:100%;border:1px solid rgba(0,0,0,.13);border-radius:9px;padding:10px 14px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#f8f9fc">
      <div id="pe-err" style="font-size:12px;color:#E24B4A;margin-bottom:8px;display:none">Incorrect password. Try again.</div>
      <div style="display:flex;gap:8px">
        <button onclick="loginPE()" style="flex:1;padding:10px;background:linear-gradient(135deg,#3B6D11,#5a9a1a);color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit">Login</button>
        <button onclick="hidePELogin()" style="padding:10px 14px;background:rgba(0,0,0,.05);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="logo">GC</div>
  <div style="line-height:1.2"><div style="font-weight:900;font-size:13px">Grade Change</div><div style="font-size:10px;color:#888">PP Plant</div></div>
  <span id="role-badge" style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(24,95,165,.12);color:#185FA5;white-space:nowrap">Operator</span>

  <div style="display:flex;gap:5px;flex-shrink:0;margin-left:6px">

    <button id="logout-btn" onclick="logout()" style="background:rgba(0,0,0,.06);color:#555;border:1px solid rgba(0,0,0,.12);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">&#8617; Exit</button>
  </div>
</div>

   HOW TO ENABLE REAL-TIME SYNC:

   2. Create a project → Add Web App

var FIREBASE_CONFIG = {
  apiKey:            "",   /* ← paste your apiKey here */
  authDomain:        "",
  databaseURL:       "",   /* ← paste your databaseURL here (required) */
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};

var DB = null;          /* Firebase db reference */
var SYNC_ON = false;    /* true when Firebase is connected */
var SYNC_REF = null;    /* db path reference */
var SYNC_PLANT = "pp-plant-1"; /* change per plant/site if needed */

function initFirebase(){
  if(!FIREBASE_CONFIG.databaseURL){ updateSyncUI("not-configured"); return; }
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    DB = firebase.database();
    SYNC_REF = DB.ref(SYNC_PLANT);
    /* Listen for remote changes */
    SYNC_REF.on("value", function(snap){
      var data = snap.val();
      if(!data) { pushToFirebase(); return; } /* first time - push local data */
      /* Update local state from remote */
      if(data.TRANS) TRANS = data.TRANS;
      if(data.WB) WB = data.WB;
      /* Re-init ST/CDR/SMP for any new transitions */
      TRANS.forEach(function(t,i){
        if(!ST[i])  ST[i]  = t.steps.map(function(){return"p";});
        if(!CDR[i]) CDR[i] = {};
        if(!SMP[i]) SMP[i] = [];
        if(STARTED[i]===undefined) STARTED[i]=null;
        if(DUR[i]===undefined) DUR[i]=null;
      });
      SYNC_ON = true;
      updateSyncUI("connected");
      /* Refresh current view */
      var activePage = document.querySelector(".page.on");
      if(activePage){
        var id = activePage.id;
        if(id==="eng") renderEng();
        else if(id==="wb") renderWB();
        else if(id==="dash") renderDash();
      }
    }, function(err){
      SYNC_ON = false;
      updateSyncUI("error");
    });
    updateSyncUI("connecting");
  } catch(e){
    updateSyncUI("error");
    console.warn("Firebase init error:", e.message);
  }
}

function pushToFirebase(){
  if(!DB || !SYNC_REF) return;
  SYNC_REF.set({ TRANS: TRANS, WB: WB, updatedBy: OP, updatedAt: Date.now() })
    .then(function(){ updateSyncUI("synced"); })
    .catch(function(){ updateSyncUI("error"); });
}

/* Call this after any PE change to TRANS or WB */
function syncIfPE(){
  if(ROLE==="pe" && DB) pushToFirebase();
}

function updateSyncUI(state){
  var el = document.getElementById("sync-indicator");
  if(!el) return;
  var states = {
    "not-configured": { text:"Sync: Setup needed", col:"#9b9b97", bg:"rgba(0,0,0,.06)" },
    "connecting":     { text:"Sync: Connecting…",  col:"#854F0B", bg:"rgba(250,238,218,.9)" },
    "connected":      { text:"Sync: Connected ✓",  col:"#3B6D11", bg:"rgba(192,221,151,.3)" },
    "synced":         { text:"Sync: Saved ✓",       col:"#3B6D11", bg:"rgba(192,221,151,.3)" },
    "error":          { text:"Sync: Offline",        col:"#E24B4A", bg:"rgba(252,235,235,.9)" }
  };
  var s = states[state] || states["not-configured"];
  el.textContent = s.text;
  el.style.color = s.col;
  el.style.background = s.bg;
  el.style.borderColor = s.col + "40";
}

  setTimeout(function(){var b=document.getElementById("op-badge");if(b)b.focus();},80);
}

function lookupBadge(){
  var bf=document.getElementById("op-badge");
  var badge=(bf?bf.value:"").trim();
  var emp=EMPLOYEES[badge];
  var pr=document.getElementById("op-name-preview");
  var er=document.getElementById("op-err");
  var nt=document.getElementById("op-name-text");
  var pt=document.getElementById("op-pos-text");
  if(emp){
    if(pr)pr.style.display="block";
    if(er)er.style.display="none";
    if(nt)nt.textContent=emp.n;
    if(pt)pt.textContent=emp.p;
  } else {
    if(pr)pr.style.display="none";
    if(badge.length>=4){if(er)er.style.display="block";}
    else{if(er)er.style.display="none";}
  }
}

function hideOpLogin(){document.getElementById("op-login-form").style.display="none";}
function checkBadge(){
  var badge=(document.getElementById("op-badge")||{}).value||"";
  badge=badge.trim();
  var info=document.getElementById("op-badge-info"),err=document.getElementById("op-err"),btn=document.getElementById("op-login-btn");
  var nm=document.getElementById("op-badge-name"),ps=document.getElementById("op-badge-pos");
  if(!badge){
    if(info)info.style.display="none";if(err)err.style.display="none";
    if(btn){btn.disabled=true;btn.style.background="rgba(0,0,0,.1)";btn.style.color="#aaa";btn.style.cursor="not-allowed";}
    return;
  }
  var emp=EMPLOYEES[badge];
  if(emp){
    if(info)info.style.display="block";if(nm)nm.textContent=emp.n||emp.name;if(ps)ps.textContent=emp.p||emp.pos;
    if(err)err.style.display="none";
    if(btn){btn.disabled=false;btn.style.background="linear-gradient(135deg,#185FA5,#2b7fc4)";btn.style.color="#fff";btn.style.cursor="pointer";}
  } else {
    if(info)info.style.display="none";
    if(err)err.style.display=(badge.length>=4?"block":"none");
    if(btn){btn.disabled=true;btn.style.background="rgba(0,0,0,.1)";btn.style.color="#aaa";btn.style.cursor="not-allowed";}
  }
}
function loginOp(){
  var bf=document.getElementById("op-badge");
  var badge=(bf?bf.value:"").trim();
  var emp=EMPLOYEES[badge];
  if(!emp){
    lookupBadge();
    var er=document.getElementById("op-err");if(er)er.style.display="block";
    return;
  }
  OP_BADGE=badge;
  loginAs("operator", emp.n);
}

function loginPE(){
  var pwd=document.getElementById("pe-pwd").value;
  if(pwd===PE_PASSWORD){
    hidePELogin();

    loginAs("pe",n||"Process Engineer");

    document.getElementById("pe-err").style.display="block";
    document.getElementById("pe-pwd").value="";
    setTimeout(function(){document.getElementById("pe-pwd").focus();},50);

function loginAs(role,name,badge,pos){
  ROLE=role; if(name)OP=name;

function logout(){

/* Save hardcoded defaults — these can never be lost */
var DEFAULT_TRANS=JSON.parse(JSON.stringify(TRANS));

/* Merge remote TRANS with local — never lose transitions */
function mergeTrans(remoteTrans){
  if(!remoteTrans||!Array.isArray(remoteTrans))return;
  var localById={};
  TRANS.forEach(function(t){localById[t.id]=t;});
  /* Update existing and add new from remote */
  remoteTrans.forEach(function(rt){
    if(rt&&rt.id&&rt.from&&rt.to&&Array.isArray(rt.steps)){
      localById[rt.id]=rt; /* remote version wins (may have edits) */
    }
  });
  /* Ensure all defaults exist */
  DEFAULT_TRANS.forEach(function(dt){
    if(!localById[dt.id]) localById[dt.id]=JSON.parse(JSON.stringify(dt));
  });
  TRANS=Object.keys(localById).map(function(k){return localById[k];});
  /* Sort: defaults first (by original order), then custom */
  var defOrder={};DEFAULT_TRANS.forEach(function(dt,i){defOrder[dt.id]=i;});
  TRANS.sort(function(a,b){
    var ai=defOrder[a.id]!==undefined?defOrder[a.id]:999;
    var bi=defOrder[b.id]!==undefined?defOrder[b.id]:999;
    return ai-bi;
  });
  /* Re-init state for all transitions */
  ATID=Math.min(ATID,TRANS.length-1);
  TRANS.forEach(function(t,i){
    if(!ST[i])ST[i]=t.steps.map(function(){return"p";});
    if(!CDR[i])CDR[i]={};if(!SMP[i])SMP[i]=[];
    if(STARTED[i]===undefined)STARTED[i]=null;if(DUR[i]===undefined)DUR[i]=null;
    if(!CHAT[i])CHAT[i]=[];
  });
}

function h(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtS(s){var hr=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return hr>0?hr+"h "+p2(m)+"m "+p2(sc)+"s":p2(m)+"m "+p2(sc)+"s";}

function fmtMs(ms){return fmtS(Math.floor(ms/1000));}

function makeTrend(smp,tr){
  if(smp.length<2)return'<div style="text-align:center;color:#9b9b97;padding:14px;font-size:12px">Add at least 2 results to see trend</div>';
  var pellets=smp.filter(function(r){return !r.stype||r.stype==="Pellet";});
  var powders=smp.filter(function(r){return r.stype==="Powder";});

  /* Extract short time label from "21.04.2026 14:30" or "14:30" */
  function shortTime(t){
    if(!t)return"";
    var parts=String(t).trim().split(/\s+/);
    if(parts.length>=2){
      var datePart=parts[0].replace(/\.\d{4}$/,""); /* "21.04" */
      return datePart+"\n"+parts[1];
    }
    return parts[0];
  }

  function makeSVG(arr,key,label,unit,lo,hi,tgt,bl,bh,mainCol,typeLabel,dotStyle){
    if(!arr.length)return'';
    var W=300,H=120,PAD=36,RP=10,TP=28,BP=28,PW=W-PAD-RP,PH=H-TP-BP;
    var n=arr.length;
    function pts(){
      return arr.map(function(r,gi){
        var v=parseFloat(r[key]);
        if(isNaN(v))return null;
        var x=PAD+(n>1?gi/(n-1):0.5)*PW;
        var y=TP+PH-(((v-lo)/(hi-lo))*PH);
        return{x:x,y:Math.max(TP,Math.min(TP+PH,y)),v:v,t:r.time,i:gi};
      }).filter(Boolean);
    }
    var allPts=pts();
    if(!allPts.length)return'';
    function py(v){return TP+PH-(((v-lo)/(hi-lo))*PH);}
    var by1=py(bh),by2=py(bl),ty=py(tgt);
    var s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
    /* Header */
    s+='<text x="'+PAD+'" y="12" font-size="9" font-weight="700" fill="'+mainCol+'">'+label+' — '+typeLabel+'</text>';
    s+='<text x="'+PAD+'" y="22" font-size="7.5" fill="#9b9b97">'+lo+'-'+hi+' '+unit+' | tgt '+tgt+'</text>';
    /* Spec lines */
    s+='<line x1="'+PAD+'" y1="'+TP+'" x2="'+(PAD+PW)+'" y2="'+TP+'" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>';
    s+='<line x1="'+PAD+'" y1="'+(TP+PH)+'" x2="'+(PAD+PW)+'" y2="'+(TP+PH)+'" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>';
    /* Target band + line */
    s+='<rect x="'+PAD+'" y="'+by1+'" width="'+PW+'" height="'+Math.max(0,by2-by1)+'" fill="#C0DD97" opacity="0.35" rx="1"/>';
    s+='<line x1="'+PAD+'" y1="'+ty+'" x2="'+(PAD+PW)+'" y2="'+ty+'" stroke="#3B6D11" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>';
    /* Y labels */
    s+='<text x="'+(PAD-2)+'" y="'+(TP+4)+'" text-anchor="end" font-size="7.5" fill="#9b9b97">'+hi+'</text>';
    s+='<text x="'+(PAD-2)+'" y="'+(TP+PH+4)+'" text-anchor="end" font-size="7.5" fill="#9b9b97">'+lo+'</text>';
    s+='<text x="'+(PAD-2)+'" y="'+(ty+3)+'" text-anchor="end" font-size="7.5" fill="#3B6D11" font-weight="700">'+tgt+'</text>';
    /* Line */
    if(allPts.length>1){
      var path=allPts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
      var strokeDash=dotStyle==="square"?' stroke-dasharray="5,3"':'';
      s+='<path d="'+path+'" fill="none" stroke="'+mainCol+'" stroke-width="2"'+strokeDash+' stroke-linecap="round" stroke-linejoin="round"/>';
    }
    /* Dots + value labels */
    allPts.forEach(function(p){
      var inB=p.v>=bl&&p.v<=bh,inS=p.v>=lo&&p.v<=hi,c=inB?"#3B6D11":inS?"#EF9F27":"#E24B4A";
      if(dotStyle==="square"){
        s+='<rect x="'+(p.x-4).toFixed(1)+'" y="'+(p.y-4).toFixed(1)+'" width="8" height="8" fill="'+c+'" stroke="#fff" stroke-width="1.2" rx="1"/>';
      } else {
        s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3.5" fill="'+c+'" stroke="#fff" stroke-width="1.2"/>';
      }
      s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-8).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+c+'" font-weight="700">'+p.v.toFixed(2)+'</text>';
    });
    /* X time labels — show max 6 evenly spaced, two-line date/time */
    var maxLabels=Math.min(allPts.length,6);
    var step=maxLabels>1?Math.max(1,Math.floor((allPts.length-1)/(maxLabels-1))):1;
    for(var li=0;li<allPts.length;li+=step){
      if(li>=allPts.length)break;
      var p=allPts[li];
      var tParts=shortTime(p.t).split("\n");
      var anchor=li===0?"start":(li>=allPts.length-step?"end":"middle");
      if(tParts.length===2){
        s+='<text x="'+p.x.toFixed(1)+'" y="'+(H-14)+'" text-anchor="'+anchor+'" font-size="6.5" fill="#bbb">'+tParts[0]+'</text>';
        s+='<text x="'+p.x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="'+anchor+'" font-size="7" fill="#777" font-weight="600">'+tParts[1]+'</text>';
      } else {
        s+='<text x="'+p.x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="'+anchor+'" font-size="7" fill="#777" font-weight="600">'+tParts[0]+'</text>';
      }
    }
    /* Always show last point label if not already shown */
    var lastIdx=allPts.length-1;
    if(lastIdx % step !== 0 && allPts.length>1){
      var lp=allPts[lastIdx];
      var ltParts=shortTime(lp.t).split("\n");
      if(ltParts.length===2){
        s+='<text x="'+lp.x.toFixed(1)+'" y="'+(H-14)+'" text-anchor="end" font-size="6.5" fill="#bbb">'+ltParts[0]+'</text>';
        s+='<text x="'+lp.x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="end" font-size="7" fill="#777" font-weight="600">'+ltParts[1]+'</text>';
      } else {
        s+='<text x="'+lp.x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="end" font-size="7" fill="#777" font-weight="600">'+ltParts[0]+'</text>';
      }
    }
    s+='</svg>';
    return s;
  }

  function makeChartPair(key,label,unit,lo,hi,tgt,bl,bh){
    var hasPel=pellets.some(function(r){return !isNaN(parseFloat(r[key]));});
    var hasPow=powders.some(function(r){return !isNaN(parseFloat(r[key]));});
    var out='';
    if(hasPel) out+=makeSVG(pellets,key,label,unit,lo,hi,tgt,bl,bh,"#185FA5","Pellet","circle");
    if(hasPow) out+=makeSVG(powders,key,label,unit,lo,hi,tgt,bl,bh,"#534AB7","Powder","square");
    return out;
  }

  var html='';
  html+=makeChartPair("mfr","MFR","g/10min",tr.mfrLo,tr.mfrHi,tr.mfrT,tr.mfrBl,tr.mfrBh);
  var hasXS=smp.some(function(r){return !isNaN(parseFloat(r.xs));});
  if(hasXS) html+=makeChartPair("xs","XS","%",tr.xsLo,tr.xsHi,tr.xsT,tr.xsBl,tr.xsBh);
  if(tr.c2Lo){
    var c2b=(tr.c2Hi-tr.c2Lo)*0.25;
    html+=makeChartPair("c2","C2","%",tr.c2Lo,tr.c2Hi,tr.c2T,tr.c2Lo+c2b,tr.c2Hi-c2b);
  }
  if(!html) return'<div style="text-align:center;color:#9b9b97;padding:14px;font-size:12px">No chart data</div>';
  return'<div style="display:flex;flex-direction:column;gap:6px">'+
    html.split('</svg>').filter(function(s){return s.trim();}).map(function(s){
      return'<div style="background:rgba(0,0,0,.03);border-radius:7px;padding:7px 6px;border:1px solid rgba(0,0,0,.06)">'+s+'</svg></div>';
    }).join('')+'</div>';
}

/* ============================================================
   ELAPSED TIMER
   ============================================================ */
function startELT(){
  if(ELI)clearInterval(ELI);
  ELI=setInterval(function(){var el=document.getElementById("el-val");if(el&&STARTED[ATID])el.textContent=fmtMs(Date.now()-STARTED[ATID]);},1000);
}
function startTrans(){
  var tr=getTR();STARTED[ATID]=Date.now();
  ST[ATID]=tr.steps.map(function(){return"p";});ST[ATID][0]="a";
  CDR[ATID]={};SMP[ATID]=[];CHAT[ATID]=[];DUR[ATID]=null;
  ELOG.push({time:nowT(),type:"info",msg:"Grade change started: "+tr.from+" to "+tr.to+" | Op: "+OP});
  syncProgress();startELT();renderOp();
}
function resetTrans(){
  if(!confirm("Reset? All progress will be lost."))return;
  var tr=getTR();STARTED[ATID]=null;DUR[ATID]=null;
  ST[ATID]=tr.steps.map(function(){return"p";});CDR[ATID]={};SMP[ATID]=[];CHAT[ATID]=[];
  if(ELI){clearInterval(ELI);ELI=null;}
  ELOG.push({time:nowT(),type:"warn",msg:"Reset: "+tr.from+" to "+tr.to});
  syncProgress();renderOp();
}
function completeTrans(){
  if(!confirm("Grade change tamamlansın? Lab nəticələri və chat sıfırlanacaq."))return;
  var tr=getTR();
  DUR[ATID]=Date.now()-STARTED[ATID];
  ELOG.push({time:nowT(),type:"confirm",msg:"Complete! "+tr.from+" to "+tr.to+" - "+fmtMs(DUR[ATID])+" | Completed by "+OP});
  /* Clear lab and chat for this transition */
  SMP[ATID]=[];
  CHAT[ATID]=[];
  if(ELI){clearInterval(ELI);ELI=null;}
  syncProgress();renderOp();
}
function chT(v){
  var newId=parseInt(v);
  if(ELI){clearInterval(ELI);ELI=null;}
  var tr=TRANS[ATID];
  if(tr){ST[ATID]=tr.steps.map(function(){return"p";});CDR[ATID]={};SMP[ATID]=[];CHAT[ATID]=[];STARTED[ATID]=null;DUR[ATID]=null;}
  ATID=newId;
  var ntr=TRANS[ATID];
  if(ntr){if(!ST[ATID])ST[ATID]=ntr.steps.map(function(){return"p";});if(!CDR[ATID])CDR[ATID]={};if(!SMP[ATID])SMP[ATID]=[];if(!CHAT[ATID])CHAT[ATID]=[];}
  renderOp();
}
function cnfStep(si){
  var sts=getST(ATID),tr=getTR();
  var nel=document.getElementById("nt_"+si);var notes=nel?nel.value:"";
  sts[si]="c";if(si+1<sts.length)sts[si+1]="a";
  if(!CDR[ATID])CDR[ATID]={};
  CDR[ATID][si]={time:nowT(),operator:OP,notes:notes};
  ELOG.push({time:nowT(),type:"confirm",msg:"Step "+(si+1)+" confirmed by "+OP+(notes?" - "+notes:"")});
  var sid=tr.steps[si].id;
  if(window["_cdi_"+sid]){clearInterval(window["_cdi_"+sid]);delete window["_cdi_"+sid];}
  syncProgress();renderOp();
}
function startCD(sid,mins){
  window["_cdr_"+sid]=mins*60;
  window["_cdi_"+sid]=setInterval(function(){
    if(window["_cdr_"+sid]>0){window["_cdr_"+sid]--;
      var el=document.getElementById("cdv_"+sid),ef=document.getElementById("cdf_"+sid);
      if(el){var r=window["_cdr_"+sid];el.textContent=r===0?"TIME ELAPSED":fmtS(r);if(r===0)el.style.color="#E24B4A";}
      if(ef){var sp=null;TRANS.forEach(function(t){t.steps.forEach(function(s){if(s.id===sid)sp=s;});});if(sp){var tot=sp.mins*60,pp=Math.round((tot-window["_cdr_"+sid])/tot*100);ef.style.width=pp+"%";ef.style.background=pp>90?"#E24B4A":pp>70?"#EF9F27":"#378ADD";}}
    }else{clearInterval(window["_cdi_"+sid]);}
  },1000);
}
function goToWB(){
  document.querySelectorAll(".page").forEach(function(el){el.classList.remove("on");});
  document.querySelectorAll(".nb").forEach(function(el){el.classList.remove("on");});
  document.getElementById("wb").classList.add("on");
  var wbBtn=Array.from(document.querySelectorAll(".nb")).find(function(b){return b.textContent==="Workbooks";});
  if(wbBtn)wbBtn.classList.add("on");
  renderWB();
}
function togSF(){
  var el=document.getElementById("sf");
  if(el){
    el.classList.toggle("hidden");
    if(!el.classList.contains("hidden")){
      var now=new Date();
      var dEl=document.getElementById("ns-date");
      var tEl=document.getElementById("ns-time");
      var dd=String(now.getDate()).padStart(2,"0");

      var yyyy=now.getFullYear();

      if(dEl) dEl.value=dd+"."+mm+"."+yyyy;

function saveSmp(){
  var mfrEl=document.getElementById("ns-mfr");
  var xsEl=document.getElementById("ns-xs");
  var mfr=mfrEl?mfrEl.value:"";
  var xs=xsEl?xsEl.value:"";
  if(!mfr&&!xs){alert("Enter at least MFR or XS.");return;}
  var tel=document.querySelector('input[name="smp-type"]:checked');
  var stype=tel?tel.value:"Pellet";
  var dateEl=document.getElementById("ns-date");
  var timeEl=document.getElementById("ns-time");

  var timeVal=timeEl?timeEl.value.trim():"";

  var timeStr=dateVal?dateVal+" "+timeVal:timeVal;
  var c2El=document.getElementById("ns-c2");
  var notesEl=document.getElementById("ns-notes");
  if(!SMP[ATID])SMP[ATID]=[];
  SMP[ATID].push({id:uid(),time:timeStr,stype:stype,mfr:mfr,xs:xs,c2:c2El?c2El.value:"",notes:notesEl?notesEl.value:""});
  ELOG.push({time:nowT(),type:"confirm",msg:"Lab result ("+stype+"): MFR "+(mfr||"-")+" XS "+(xs||"-")+"%"});
  syncProgress();renderOp();
}
function delSmp(idx){if(!SMP[ATID])return;SMP[ATID].splice(idx,1);syncProgress();renderOp();}

/* ============================================================
   CHAT — operator ↔ engineer messaging
   ============================================================ */
function sendChat(ti){
  var inp=document.getElementById("chat-inp-"+ti);
  if(!inp)return;
  var txt=inp.value.trim();
  if(!txt)return;
  if(!CHAT[ti])CHAT[ti]=[];
  var now=new Date();
  var dd=String(now.getDate()).padStart(2,"0");
  var mm=String(now.getMonth()+1).padStart(2,"0");
  var hh=String(now.getHours()).padStart(2,"0");
  var mi=String(now.getMinutes()).padStart(2,"0");
  CHAT[ti].push({
    id:uid(),
    time:dd+"."+mm+" "+hh+":"+mi,
    from:OP,
    role:ROLE==="pe"?"pe":"op",
    text:txt
  });
  inp.value="";
  syncProgress();
  renderChatMessages(ti);
  var box=document.getElementById("chat-msgs-"+ti);
  if(box)box.scrollTop=box.scrollHeight;
}

    '</div></div>';

/* ============================================================
   OPERATOR RENDER
   ============================================================ */
function renderOp(){
  var tr=getTR(),i=ATID,sts=getST(i),smp=SMP[i]||[],cdat=CDR[i]||{};
  var isS=!!STARTED[i],done=sts.filter(function(s){return s==="c";}).length;
  var allStepsDone=isS&&done===sts.length;
  var isCompleted=allStepsDone&&!!DUR[i];
  var pct=sts.length>0?Math.round(done/sts.length*100):0;
  var opts=TRANS.map(function(t,ti){return'<option value="'+ti+'"'+(ti===i?" selected":"")+'>'+h(t.from)+' to '+h(t.to)+'</option>';}).join("");
  var latest=smp.length?smp[smp.length-1]:null;
  var lMFR=latest?parseFloat(latest.mfr):NaN,lXS=latest?parseFloat(latest.xs):NaN,lC2=latest?parseFloat(latest.c2):NaN;
  var startedDT=STARTED[i]?new Date(STARTED[i]).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"";
  var ncols=tr.c2Lo?3:2;
  var specH='<div style="display:grid;grid-template-columns:repeat('+ncols+',1fr);gap:9px;margin-bottom:13px">'+
    specBox("Pellet MFR",tr.mfrLo,tr.mfrHi,tr.mfrT,"g/10 min","#185FA5")+
    specBox("XS",tr.xsLo,tr.xsHi,tr.xsT,"%","#534AB7")+
    (tr.c2Lo?specBox("C2 Content",tr.c2Lo,tr.c2Hi,tr.c2T,"%","#993C1D"):"")+
  '</div>';
  var gaugeH=qbar(isNaN(lMFR)?null:lMFR,tr.mfrLo,tr.mfrHi,tr.mfrT,tr.mfrBl,tr.mfrBh,"MFR","g/10 min",tr.mfrLo+"-"+tr.mfrHi)+
    qbar(isNaN(lXS)?null:lXS,tr.xsLo,tr.xsHi,tr.xsT,tr.xsBl,tr.xsBh,"XS","%",tr.xsLo+"-"+tr.xsHi+"%");
  if(tr.c2Lo){var c2bw=(tr.c2Hi-tr.c2Lo)*0.25;gaugeH+=qbar(isNaN(lC2)?null:lC2,tr.c2Lo,tr.c2Hi,tr.c2T,tr.c2Lo+c2bw,tr.c2Hi-c2bw,"C2 Content","%",tr.c2Lo+"-"+tr.c2Hi+"%");}
  var smpR="";
  if(smp.length){smpR=smp.slice().reverse().map(function(r,ri){
    var mfr=parseFloat(r.mfr),xs=parseFloat(r.xs),c2=parseFloat(r.c2);
    var mok=mfr>=tr.mfrLo&&mfr<=tr.mfrHi,xok=xs>=tr.xsLo&&xs<=tr.xsHi,cok=tr.c2Lo?c2>=tr.c2Lo&&c2<=tr.c2Hi:true;
    var origIdx=smp.length-1-ri;
    var tc=r.stype==="Powder"?"#534AB7":"#185FA5",tbg=r.stype==="Powder"?"rgba(83,74,183,.12)":"rgba(24,95,165,.12)";
    return'<tr style="background:'+(ri===0?"rgba(24,95,165,.04)":"transparent")+'">'+
      '<td>'+h(r.time)+'</td>'+
      '<td><span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+tbg+';color:'+tc+'">'+h(r.stype||"Pellet")+'</span></td>'+
      '<td class="'+(isNaN(mfr)?"":mok?"ok":"bad")+'">'+h(r.mfr||"-")+'</td>'+
      '<td class="'+(isNaN(xs)?"":xok?"ok":"bad")+'">'+h(r.xs||"-")+'</td>'+
      '<td class="'+(isNaN(c2)||!tr.c2Lo?"":cok?"ok":"bad")+'">'+h(r.c2||"-")+'</td>'+
      '<td style="color:#777">'+h(r.notes||"-")+'</td>'+
      '<td><button onclick="delSmp('+origIdx+')" style="background:none;border:none;color:#E24B4A;cursor:pointer;font-size:14px;font-weight:700">x</button></td>'+
    '</tr>';
  }).join("");}
  var logH=ELOG.slice().reverse().slice(0,8).map(function(ev){
    return'<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.05);align-items:flex-start">'+
      '<span style="font-size:11px;font-family:monospace;color:#9b9b97;white-space:nowrap;padding-top:2px">'+h(ev.time)+'</span>'+
      '<div style="width:7px;height:7px;border-radius:50%;background:'+(ev.type==="confirm"?"#639922":"#ccc")+';flex-shrink:0;margin-top:5px"></div>'+
      '<span style="font-size:13px">'+h(ev.msg)+'</span></div>';
  }).join("");
  var out='<div class="card"><div class="fx" style="margin-bottom:8px">'+
    '<div style="text-align:center"><div style="font-size:10px;color:#999;font-weight:600;text-transform:uppercase">Current</div><div class="mon" style="font-size:18px;font-weight:900">'+h(tr.from)+'</div></div>'+
    '<div style="font-size:24px;color:#ccc;font-weight:300;padding:0 4px">&#8594;</div>'+
    '<div style="text-align:center"><div style="font-size:10px;color:#999;font-weight:600;text-transform:uppercase">Target</div><div class="mon" style="font-size:18px;font-weight:900;color:#185FA5">'+h(tr.to)+'</div></div>'+

function renderDash(){
  var tr=getTR(),i=ATID,sts=getST(i);
  var isS=!!STARTED[i],done=sts.filter(function(s){return s==="c";}).length;
  var allD=isS&&done===sts.length,smp=SMP[i]||[];
  var onSp=0,tot=0;
  smp.forEach(function(r){var m=parseFloat(r.mfr);if(!isNaN(m)){tot++;if(m>=tr.mfrLo&&m<=tr.mfrHi)onSp++;}});
  var rate=tot>0?Math.round(onSp/tot*100):null,off=tot-onSp;
  var pct=sts.length>0?Math.round(done/sts.length*100):0;
  var durStr=allD&&DUR[i]?fmtMs(DUR[i]):isS?fmtMs(Date.now()-STARTED[i]):"--";
  var stl=!isS?"Not started":allD?"Complete":"In progress",stc=!isS?"#9b9b97":allD?"#3B6D11":"#185FA5";
  var out='<div class="card"><div class="fx" style="margin-bottom:8px"><div style="flex:1">'+
    '<div class="fx" style="margin-bottom:3px"><span class="mon" style="font-size:16px;font-weight:900">'+h(tr.from)+'</span>'+
    '<span style="color:#ccc;font-size:20px;font-weight:300;padding:0 5px">&#8594;</span>'+
    '<span class="mon" style="font-size:16px;font-weight:900;color:#185FA5">'+h(tr.to)+'</span>'+
    '<span style="font-size:11px;background:rgba(0,0,0,.05);color:#777;padding:2px 8px;border-radius:5px">'+h(tr.type)+'</span></div>'+
    '<div style="font-size:11px;color:#9b9b97">'+h(tr.ver)+' | '+h(tr.add)+'</div></div>'+
    '<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:'+stc+'">'+stl+'</div>'+
    '<div class="mon" style="font-size:11px;color:#9b9b97">'+done+'/'+sts.length+'</div></div></div>'+
    '<div class="pbar" style="margin-bottom:12px"><div style="height:100%;width:'+pct+'%;background:'+(allD?"linear-gradient(90deg,#3B6D11,#5a9a1a)":isS?"linear-gradient(90deg,#185FA5,#2b7fc4)":"rgba(0,0,0,.1)")+';border-radius:4px;transition:width .5s"></div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">'+
    '<div style="background:rgba(24,95,165,.07);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(24,95,165,.14)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Duration</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:#185FA5">'+durStr+'</div></div>'+
    '<div style="background:rgba(231,50,50,.06);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(231,50,50,.13)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Off-spec results</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:'+(off>0?"#E24B4A":"#3B6D11")+'">'+off+'<span style="font-size:11px;font-weight:500;color:#9b9b97;margin-left:3px">/ '+tot+'</span></div></div>'+
    '<div style="background:rgba(59,109,17,.07);border-radius:9px;padding:11px;text-align:center;border:1px solid rgba(59,109,17,.13)">'+
      '<div style="font-size:10px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">On-spec rate</div>'+
      '<div class="mon" style="font-size:17px;font-weight:900;color:'+(rate===null?"#9b9b97":rate>=90?"#3B6D11":rate>=70?"#EF9F27":"#E24B4A")+'">'+(rate===null?"--":rate+"%")+'</div></div></div></div>';
  /* Selector for other transitions */
  var opts=TRANS.map(function(t,ti){return'<option value="'+ti+'"'+(ti===i?" selected":"")+'>'+h(t.from)+' to '+h(t.to)+'</option>';}).join("");
  out+='<div class="card"><div style="font-size:12px;font-weight:700;color:#777;margin-bottom:6px">Switch transition</div>'+
    '<select class="sel" onchange="ATID=parseInt(this.value);renderDash()">'+opts+'</select></div>';
  document.getElementById("dash").innerHTML=out;
}

function engImport(ti){
  if(ROLE!=="pe")return;
  var ta=document.getElementById("paste-ta-"+ti);if(!ta||!ta.value.trim()){alert("Paste some text first.");return;}
  var lines=ta.value.trim().split("\n").map(function(l){return l.trim();}).filter(Boolean);
  var steps=[],cur=null;
  lines.forEach(function(line){
    var m=line.match(/^(\d+)[.)\s]+(.+)/);
    if(m){if(cur)steps.push(cur);cur={instr:m[2],trigger:"See instruction",mins:null,role:"Operator",title:"Step "+m[1]+": "+(m[2].length>55?m[2].slice(0,55)+"...":m[2])};}
    else if(cur)cur.instr+=" "+line;
  });
  if(cur)steps.push(cur);
  if(!steps.length){alert("No numbered steps found.");return;}
  TRANS[ti].steps=steps.map(function(s){return Object.assign({id:uid(),dcs:null,tgt:""},s);});
  ST[ti]=TRANS[ti].steps.map(function(){return"p";});
  ENG_PASTE=-1;alert(steps.length+" steps imported!");renderEng();
}

function engDelTrans(ti){
  if(ROLE!=="pe")return;
  var tr=TRANS[ti];
  if(!tr)return;
  if(!confirm("Delete transition "+tr.from+" → "+tr.to+"? This cannot be undone."))return;
  TRANS.splice(ti,1);
  /* Re-index state */
  var newST={},newCDR={},newSMP={},newSTARTED={},newDUR={},newCHAT={};
  TRANS.forEach(function(t,i){
    newST[i]=ST[i]||t.steps.map(function(){return"p";});
    newCDR[i]=CDR[i]||{};newSMP[i]=SMP[i]||[];
    newSTARTED[i]=STARTED[i]!==undefined?STARTED[i]:null;
    newDUR[i]=DUR[i]!==undefined?DUR[i]:null;
    newCHAT[i]=CHAT[i]||[];
  });
  ST=newST;CDR=newCDR;SMP=newSMP;STARTED=newSTARTED;DUR=newDUR;CHAT=newCHAT;
  if(ATID>=TRANS.length)ATID=Math.max(0,TRANS.length-1);
  ENG_OPEN=-1;ENG_EDIT_STEP=null;
  syncIfPE();renderEng();
}

function addEmployee(){
  var badge=document.getElementById("new-emp-badge").value.trim();
  var name=document.getElementById("new-emp-name").value.trim();
  var pos=document.getElementById("new-emp-pos").value.trim()||"Plant Operator";
  if(!badge||!name){alert("Badge number and name are required.");return;}
  if(EMPLOYEES[badge]){
    var existName=EMPLOYEES[badge].n||EMPLOYEES[badge].name||badge;
    if(!confirm("Badge "+badge+" already exists ("+existName+"). Overwrite?"))return;
  }
  EMPLOYEES[badge]={n:name,name:name,p:pos,pos:pos};
  saveLocal();
  if(SYNC_DB_URL) pushToFirebase();
  showToast("Employee added: "+name+" ["+badge+"]");
  document.getElementById("new-emp-badge").value="";
  document.getElementById("new-emp-name").value="";
  document.getElementById("new-emp-pos").value="";
  document.getElementById("emp-add-form").classList.add("hidden");
  renderEng();
}

function delEmployee(badge){
  var emp=EMPLOYEES[badge];
  if(!emp)return;
  var eName=emp.n||emp.name||badge;
  if(!confirm("Remove "+eName+" ("+badge+") from the system?"))return;
  delete EMPLOYEES[badge];
  saveLocal();
  if(SYNC_DB_URL) pushToFirebase();
  showToast("Removed: "+eName);
  renderEng();
}

function buildTextReport(){
  var tr=getTR();var sts=getST(ATID);var smp=SMP[ATID]||[];
  var done=sts.filter(function(s){return s==="c";}).length;
  var lines=["PP PLANT - GRADE CHANGE REPORT","================================",
    "Transition: "+tr.from+" to "+tr.to+" ("+tr.type+")","Version: "+tr.ver+" | Status: "+tr.status,
    "Operator: "+OP,"Progress: "+done+"/"+sts.length+" steps",""];
  lines.push("STEPS:","------");
  tr.steps.forEach(function(step,i){
    var st=sts[i]||"p";var cd=(CDR[ATID]||{})[i];
    var stl=st==="c"?"[DONE]":st==="a"?"[ACTIVE]":"[PENDING]";
    lines.push(stl+" Step "+(i+1)+": "+step.title);
    if(cd)lines.push("  Confirmed "+cd.time+" by "+cd.operator+(cd.notes?" - "+cd.notes:""));
  });
  if(smp.length){lines.push("","LAB RESULTS:","------------");
    smp.forEach(function(r){lines.push("  "+r.time+" | "+(r.stype||"Pellet")+" | MFR: "+(r.mfr||"-")+" | XS: "+(r.xs||"-")+(r.c2?" | C2: "+r.c2:"")+(r.notes?" | "+r.notes:""));});
  }
  lines.push("","Generated: "+new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}));
  return lines.join("\n");
}
function doPDF(){
  /* Make sure op page is active for print */
  var pages=document.querySelectorAll(".page");
  var wasActive=[];
  pages.forEach(function(p){
    if(!p.classList.contains("on")){wasActive.push({el:p,had:false});p.classList.add("on");}
    else{wasActive.push({el:p,had:true});}
  });
  /* Hide non-printable cards temporarily: spec/gauge card (2nd card), progress bar card, trend section */
  var opCards=document.querySelectorAll("#op .card");
  var tempHidden=[];
  opCards.forEach(function(c,idx){
    /* Card index 1 = Specifications card (gauges/spec boxes) — hide for PDF */
    if(idx===1){c.style.display="none";tempHidden.push(c);}
    /* Also hide the start-box / done-banner if present */
  });
  var startBox=document.querySelector(".start-box");
  if(startBox){startBox.style.display="none";tempHidden.push(startBox);}
  var doneBanner=document.querySelector(".done-banner");
  if(doneBanner){doneBanner.style.display="none";tempHidden.push(doneBanner);}
  /* Hide trend chart */
  var trendDiv=document.querySelector("#op .card [style*='Trend']");
  /* Hide add-result form */

        SYNC_DB_URL=url;SYNC_PLANT=plant;

      if(msg)msg.innerHTML='<span style="color:#E24B4A;font-weight:700">Cannot reach server. Check URL and internet.</span>';

var GC_DATA_VERSION="2.3";
function saveLocal(){
  try{
    localStorage.setItem("gc_version",GC_DATA_VERSION);
    localStorage.setItem("gc_TRANS",JSON.stringify(TRANS));
    localStorage.setItem("gc_EMPLOYEES",JSON.stringify(EMPLOYEES));
    localStorage.setItem("gc_ST",JSON.stringify(ST));
    localStorage.setItem("gc_CDR",JSON.stringify(CDR));
    localStorage.setItem("gc_SMP",JSON.stringify(SMP));
    localStorage.setItem("gc_STARTED",JSON.stringify(STARTED));
    localStorage.setItem("gc_DUR",JSON.stringify(DUR));
    localStorage.setItem("gc_CHAT",JSON.stringify(CHAT));
  }catch(e){}
}
function loadLocal(){
  try{
    var ver=localStorage.getItem("gc_version");
    if(ver!==GC_DATA_VERSION){
      try{localStorage.setItem("gc_version",GC_DATA_VERSION);}catch(ex){}
    }
    var t=localStorage.getItem("gc_TRANS");
    if(t){try{
      var p=JSON.parse(t);
      if(Array.isArray(p)&&p.length) mergeTrans(p);
    }catch(ex){}}
    var em=localStorage.getItem("gc_EMPLOYEES");
    if(em){try{var pe=JSON.parse(em);if(pe&&typeof pe==="object"){
      for(var badge in pe){var e=pe[badge];if(e){if(e.n&&!e.name)e.name=e.n;if(e.name&&!e.n)e.n=e.name;if(e.p&&!e.pos)e.pos=e.p;if(e.pos&&!e.p)e.p=e.pos;}}
      Object.assign(EMPLOYEES,pe);
    }}catch(ex){}}
    /* Load progress */
    var sST=localStorage.getItem("gc_ST");
    if(sST){try{var pST=JSON.parse(sST);if(pST&&typeof pST==="object"){for(var k in pST){ST[k]=pST[k];}}}catch(ex){}}
    var sCDR=localStorage.getItem("gc_CDR");
    if(sCDR){try{var pCDR=JSON.parse(sCDR);if(pCDR&&typeof pCDR==="object"){for(var k in pCDR){CDR[k]=pCDR[k];}}}catch(ex){}}
    var sSMP=localStorage.getItem("gc_SMP");
    if(sSMP){try{var pSMP=JSON.parse(sSMP);if(pSMP&&typeof pSMP==="object"){for(var k in pSMP){SMP[k]=pSMP[k];}}}catch(ex){}}
    var sSTARTED=localStorage.getItem("gc_STARTED");
    if(sSTARTED){try{var pSTARTED=JSON.parse(sSTARTED);if(pSTARTED&&typeof pSTARTED==="object"){for(var k in pSTARTED){STARTED[k]=pSTARTED[k];}}}catch(ex){}}
    var sDUR=localStorage.getItem("gc_DUR");
    if(sDUR){try{var pDUR=JSON.parse(sDUR);if(pDUR&&typeof pDUR==="object"){for(var k in pDUR){DUR[k]=pDUR[k];}}}catch(ex){}}
    var sCHAT=localStorage.getItem("gc_CHAT");
    if(sCHAT){try{var pCHAT=JSON.parse(sCHAT);if(pCHAT&&typeof pCHAT==="object"){for(var k in pCHAT){CHAT[k]=pCHAT[k];}}}catch(ex){}}
  }catch(e){console.warn("localStorage:",e.message);}
}

/* ── FIREBASE REST SYNC ── */
var SYNC_DB_URL="";var SYNC_PLANT="pp-plant-1";var SYNC_ON=false;var SYNC_POLL=null;
var _lastPushTime=0;var _pausePullUntil=0;

function updateSyncUI(state){
  var el=document.getElementById("sync-indicator");if(!el)return;
  var m={"not-configured":{text:"Sync: Setup needed",col:"#9b9b97",bg:"rgba(0,0,0,.06)"},
    "connecting":{text:"Sync: Connecting…",col:"#854F0B",bg:"rgba(250,238,218,.9)"},
    "connected":{text:"Sync: Connected ✓",col:"#3B6D11",bg:"rgba(192,221,151,.3)"},
    "synced":{text:"Sync: Saved ✓",col:"#3B6D11",bg:"rgba(192,221,151,.3)"},
    "offline":{text:"Sync: Offline",col:"#E24B4A",bg:"rgba(252,235,235,.9)"},
    "error":{text:"Sync: Error",col:"#E24B4A",bg:"rgba(252,235,235,.9)"}};
  var s=m[state]||m["not-configured"];
  el.textContent=s.text;el.style.color=s.col;el.style.background=s.bg;el.style.borderColor=s.col+"40";
}

function pushToFirebase(){
  if(!SYNC_DB_URL)return;
  _lastPushTime=Date.now();_pausePullUntil=Date.now()+20000;
  var url=SYNC_DB_URL.replace(/\/+$/,"")+"/"+SYNC_PLANT+".json";
  var payload=JSON.stringify({TRANS:TRANS,EMPLOYEES:EMPLOYEES,PROGRESS:{ST:ST,CDR:CDR,SMP:SMP,STARTED:STARTED,DUR:DUR,CHAT:CHAT},updatedBy:OP,updatedAt:Date.now()});
  fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:payload})
    .then(function(r){if(r.ok){updateSyncUI("synced");setTimeout(function(){updateSyncUI("connected");},2000);}else updateSyncUI("error");})
    .catch(function(){updateSyncUI("offline");});
}

/* Push only progress data (operators use PATCH so they don't overwrite TRANS) */
function pushProgress(){
  if(!SYNC_DB_URL)return;
  _pausePullUntil=Date.now()+15000;
  var url=SYNC_DB_URL.replace(/\/+$/,"")+"/"+SYNC_PLANT+".json";
  var patch={PROGRESS:{ST:ST,CDR:CDR,SMP:SMP,STARTED:STARTED,DUR:DUR,CHAT:CHAT,progressBy:OP,progressAt:Date.now()}};
  fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(patch)})
    .then(function(r){if(r.ok){updateSyncUI("synced");setTimeout(function(){updateSyncUI("connected");},2000);}else updateSyncUI("error");})
    .catch(function(){updateSyncUI("offline");});
}

/* Call after any progress change (step confirm, start, reset, sample) */
function syncProgress(){
  saveLocal();
  if(SYNC_DB_URL){
    if(ROLE==="pe") pushToFirebase();
    else pushProgress();
  }
}

function pullFromFirebase(){
  if(!SYNC_DB_URL)return;
  if(Date.now()<_pausePullUntil)return;
  if(ROLE==="pe"&&(ENG_EDIT_STEP!==null||ENG_SHOW_NEW))return;
  var url=SYNC_DB_URL.replace(/\/+$/,"")+"/"+SYNC_PLANT+".json";
  fetch(url)
    .then(function(r){return r.ok?r.json():null;})
    .then(function(data){
      if(!data)return;
      var changed=false;
      if(data.TRANS&&JSON.stringify(data.TRANS)!==JSON.stringify(TRANS)){
        mergeTrans(data.TRANS);
        changed=true;
        saveLocal();
      }
      /* Merge EMPLOYEES from remote (PE can add/remove employees) */
      if(data.EMPLOYEES&&typeof data.EMPLOYEES==="object"){
        var remEmp=data.EMPLOYEES;
        var empChanged=false;
        for(var b in remEmp){
          var re=remEmp[b];if(!re)continue;
          if(!EMPLOYEES[b]||JSON.stringify(EMPLOYEES[b])!==JSON.stringify(re)){
            EMPLOYEES[b]=re;empChanged=true;
          }
        }
        /* Remove employees deleted by PE */
        for(var lb in EMPLOYEES){
          if(remEmp&&!(lb in remEmp)){delete EMPLOYEES[lb];empChanged=true;}
        }
        if(empChanged){changed=true;saveLocal();}
      }
      /* Merge progress data from remote — always apply, Firebase may change types */
      if(data.PROGRESS){
        var prog=data.PROGRESS;
        var progChanged=false;
        if(prog.ST){
          for(var k in prog.ST){
            if(!ST[k]||JSON.stringify(ST[k])!==JSON.stringify(prog.ST[k])){
              ST[k]=prog.ST[k];progChanged=true;
            }
          }
        }
        if(prog.CDR){
          for(var k in prog.CDR){
            if(!CDR[k]||JSON.stringify(CDR[k])!==JSON.stringify(prog.CDR[k])){
              CDR[k]=prog.CDR[k];progChanged=true;
            }
          }
        }
        if(prog.SMP){
          for(var k in prog.SMP){
            if(!SMP[k]||JSON.stringify(SMP[k])!==JSON.stringify(prog.SMP[k])){
              SMP[k]=prog.SMP[k];progChanged=true;
            }
          }
        }
        if(prog.STARTED){
          for(var k in prog.STARTED){
            if(STARTED[k]!==prog.STARTED[k]){STARTED[k]=prog.STARTED[k];progChanged=true;}
          }
        }
        if(prog.DUR){
          for(var k in prog.DUR){
            if(DUR[k]!==prog.DUR[k]){DUR[k]=prog.DUR[k];progChanged=true;}
          }
        }
        if(prog.CHAT){
          for(var k in prog.CHAT){
            if(!CHAT[k]||JSON.stringify(CHAT[k])!==JSON.stringify(prog.CHAT[k])){
              CHAT[k]=prog.CHAT[k];progChanged=true;
            }
          }
        }
        if(progChanged){changed=true;saveLocal();}
      }
      if(changed){
        var pg=document.querySelector(".page.on");
        if(pg){
          /* Don't rebuild page if user is typing in sample form, chat, or step notes */
          if(pg.id==="op"){
            var sf=document.getElementById("sf");
            var chatInp=document.getElementById("chat-inp-"+ATID);
            var notesActive=document.activeElement&&document.activeElement.id&&document.activeElement.id.indexOf("nt_")===0;
            var isTyping=(sf&&!sf.classList.contains("hidden"))||(chatInp&&chatInp===document.activeElement)||notesActive;
            if(!isTyping) renderOp();
            else{ renderChatMessages(ATID); }
          }
          else if(pg.id==="eng"){
            var engChatInp=document.querySelector('[id^="chat-inp-"]');
            var engTyping=engChatInp&&engChatInp===document.activeElement;
            if(!engTyping) renderEng();
          }
          else if(pg.id==="dash")renderDash();
        }
      }
      updateSyncUI("connected");
    })
    .catch(function(){updateSyncUI("offline");});
}

function syncIfPE(){saveLocal();if(ROLE==="pe"&&SYNC_DB_URL)pushToFirebase();}
function startPolling(){
  SYNC_ON=true;updateSyncUI("connected");
  if(SYNC_POLL)clearInterval(SYNC_POLL);
  SYNC_POLL=setInterval(pullFromFirebase,20000);
  pullFromFirebase();
}

function closeSyncModal(){var d=document.getElementById("sync-modal");if(d)d.remove();}
function showSyncSetup(){
  var d=document.getElementById("sync-modal");
  if(!d){d=document.createElement("div");d.id="sync-modal";
    d.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px";
    d.onclick=function(e){if(e.target===d)closeSyncModal();};
    document.body.appendChild(d);}
  var isPE=ROLE==="pe",connected=SYNC_ON&&!!SYNC_DB_URL;
  d.innerHTML='<div style="background:#fff;border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:92vh;overflow-y:auto">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
    '<span style="font-weight:900;font-size:17px">Real-Time Sync Setup</span>'+
    '<button onclick="closeSyncModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999">&times;</button></div>'+
    '<div style="background:rgba(24,95,165,.07);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;line-height:1.7">'+
    '<b>How it works:</b> PE saves changes to Firebase. All devices auto-update every 10 sec.<br><br>'+
    '<b>You need:</b> Firebase Database URL from the PE.</div>'+
    (isPE?'<div style="background:rgba(250,238,218,.7);border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#854F0B">'+
    '<b>PE:</b> console.firebase.google.com &rarr; Create project &rarr; Realtime Database &rarr; Start in test mode &rarr; Copy URL</div>':'')+
    (connected?'<div style="background:rgba(192,221,151,.35);border-radius:8px;padding:10px;margin-bottom:14px;color:#3B6D11;font-weight:700;font-size:13px">'+
    '✓ Connected | Plant: '+SYNC_PLANT+'</div>':'')+
    '<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px">Firebase Database URL *</label>'+
    '<input id="sc-url" value="'+SYNC_DB_URL+'" placeholder="https://xxx-default-rtdb.firebaseio.com" style="width:100%;border:1.5px solid rgba(0,0,0,.15);border-radius:8px;padding:9px 11px;font-size:12px;font-family:monospace"></div>'+
    '<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px">Plant ID (same on ALL devices)</label>'+
    '<input id="sc-plant" value="'+SYNC_PLANT+'" placeholder="pp-plant-1" style="width:100%;border:1.5px solid rgba(0,0,0,.15);border-radius:8px;padding:9px 11px;font-size:13px;font-family:monospace"></div>'+
    '<button id="sc-btn" onclick="applySyncConfig()" style="width:100%;padding:13px;background:linear-gradient(135deg,#185FA5,#2b7fc4);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit">'+
    (connected?'Reconnect':'Connect and Sync')+'</button>'+
    '<div id="sc-msg" style="margin-top:10px;text-align:center;font-size:12px;color:#9b9b97">'+(connected?'Polling every 10 seconds':'Enter URL and press Connect')+'</div>'+
    (!isPE?'<div style="margin-top:10px;background:rgba(192,221,151,.15);border-radius:8px;padding:10px;font-size:12px;color:#3B6D11;font-weight:600">After connecting, PE changes appear automatically.</div>':'')+
  '</div>';
}

function applySyncConfig(){
  var urlEl=document.getElementById("sc-url"),plantEl=document.getElementById("sc-plant");
  var url=(urlEl?urlEl.value:"").trim().replace(/\/+$/,"");
  var plant=(plantEl?plantEl.value:"").trim()||"pp-plant-1";
  if(!url){var m=document.getElementById("sc-msg");if(m)m.innerHTML='<span style="color:#E24B4A;font-weight:700">Please enter the Database URL</span>';return;}
  var btn=document.getElementById("sc-btn"),msg=document.getElementById("sc-msg");
  if(btn){btn.textContent="Connecting...";btn.style.opacity="0.6";btn.disabled=true;}
  if(msg)msg.innerHTML='<span style="color:#854F0B">Testing connection...</span>';
  var testUrl=url+"/"+plant+".json";
  fetch(testUrl,{method:"GET"})
    .then(function(r){
      if(r.ok||r.status===404){
        SYNC_DB_URL=url;SYNC_PLANT=plant;
        try{localStorage.setItem("gc_sync_url",url);localStorage.setItem("gc_sync_plant",plant);}catch(e){}
        startPolling();
        if(ROLE==="pe")pushToFirebase();
        closeSyncModal();showToast("Sync connected! ✓");
      }else{
        if(btn){btn.textContent="Connect and Sync";btn.style.opacity="1";btn.disabled=false;}
        if(msg)msg.innerHTML='<span style="color:#E24B4A;font-weight:700">Failed ('+r.status+'). Check URL.</span>';
      }
    })
    .catch(function(){
      if(btn){btn.textContent="Connect and Sync";btn.style.opacity="1";btn.disabled=false;}
      if(msg)msg.innerHTML='<span style="color:#E24B4A;font-weight:700">Cannot reach server. Check URL.</span>';
    });
}

/* ── BADGE LOGIN ── */
function lookupBadge(val){
  var badge=String(val||"").trim();
  var emp=EMPLOYEES[badge];
  var lu=document.getElementById("op-lookup");
  var err=document.getElementById("op-err");
  if(!lu)return;
  if(badge.length>=4){
    if(emp){
      lu.innerHTML="<span style='color:#3B6D11;font-weight:800;font-size:14px'>&#10003; "+(emp.n||emp.name)+"</span><br><span style='color:#9b9b97;font-size:11px'>"+(emp.p||emp.pos)+"</span>";
      if(err)err.style.display="none";
    }else{
      lu.innerHTML="<span style='color:#E24B4A'>&#9888; Badge not found</span>";
    }
  }else{lu.innerHTML="";}
}

/* Load saved sync config */
try{
  var _su=localStorage.getItem("gc_sync_url"),_sp=localStorage.getItem("gc_sync_plant");
  if(_su)SYNC_DB_URL=_su.replace(/\/+$/,"");
  if(_sp)SYNC_PLANT=_sp;
  if(SYNC_DB_URL)setTimeout(startPolling,1000);
  else updateSyncUI("not-configured");
}catch(e){updateSyncUI("not-configured");}

loadLocal();
renderOp();
